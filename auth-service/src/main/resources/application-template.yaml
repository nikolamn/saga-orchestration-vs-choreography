spring:
  application:
    name: auth
  datasource: 
    url: ${AUTH_DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true 
    validate-on-migrate: true
server:
  port: 8081
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration:
      minutes: 60
grpc:
  client:
    account-service:
      address: ${GRPC_CLIENT}:9092
      enableKeepAlive: true
      negotiation-type: plaintext 
nats:
  url: ${NATS_URL}