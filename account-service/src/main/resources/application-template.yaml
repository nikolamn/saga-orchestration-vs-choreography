spring:
  application:
    name: account
  datasource: 
    url: ${ACCOUNT_DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true	
server:
  port: 8082
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration:
      minutes: 60
grpc:
  server:
    port: 9092
    security:
      enabled: false
    negotiation-type: plaintext 
nats:
  url: ${NATS_URL}