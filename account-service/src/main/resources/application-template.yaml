spring:
  application:
    name: account
  datasource: 
    url: 
    username:
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true	

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health
    health:
      show-details: always
