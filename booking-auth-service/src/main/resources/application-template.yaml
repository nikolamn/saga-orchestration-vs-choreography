spring:
  application:
    name: auth
  datasource: 
    url: 
    username:
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health
    health:
      show-details: always
app:
  jwt:
    secret:
    expiration:
      minutes:
grpc:
  server:
    port: 9090
    address: 127.0.0.1
    security:
      enabled: false
  client:
    greeter-service:
      address: 'static://localhost:9090'
      negotiation-type: plaintext
