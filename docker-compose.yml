services:
  gateway-service:
    image: gateway-service:1.0
    container_name: gateway-service
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    environment:
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_GATEWAY=TRACE
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_HTTP_SERVER_REACTIVE=DEBUG
      - SPRING_CLOUD_GATEWAY_HTTPSERVER_WIRETAP=true
      - SPRING_CLOUD_GATEWAY_HTTPCLIENT_WIRETAP=true
    env_file: 
      - ./.env
    ports:
      - "8080:8080"
    networks:
      - saga-network
    restart: unless-stopped
  auth-service:
    image: auth-service:1.0
    container_name: auth-service
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    env_file: 
      - ./.env
    ports:
      - "8081:8081"
    networks:
      - saga-network
    depends_on:
      auth-service-db:
        condition: service_healthy
    restart: unless-stopped
  account-service:
    image: account-service:1.0
    container_name: account-service
    build:
      context: ./account-service
      dockerfile: Dockerfile
    env_file: 
      - ./.env
    ports:
      - "8082:8082"
      - "9092:9092" 
    networks:
      - saga-network
    depends_on:
      account-service-db:
        condition: service_healthy
    restart: unless-stopped
  auth-service-db:
    image: postgres:18.3-bookworm
    container_name: auth-service-db
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - auth-db-data:/var/lib/postgresql
    ports: 
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saga-network
    restart: unless-stopped
  account-service-db:
    image: postgres:18.3-bookworm
    container_name: account-service-db
    environment:
      POSTGRES_DB: ${ACCOUNT_DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - account-db-data:/var/lib/postgresql
    ports: 
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${ACCOUNT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saga-network   
    restart: unless-stopped
  nats:
    image: nats:2.10-alpine
    container_name: nats
    ports:
      - "4222:4222"
    networks:
      - saga-network
    restart: unless-stopped
networks:
  saga-network:
    driver: bridge
volumes:
  auth-db-data:
  account-db-data: